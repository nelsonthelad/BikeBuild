<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BikeBuild{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="min-h-screen bg-base-300 text-base-content">

    <aside id="sidebar" class="sidebar collapsed">
        <!-- Brand + Toggle row -->
        <div class="sidebar-header">
            <a href="{{ url_for('index') }}" class="sidebar-brand">
                <i class="bi bi-bicycle sidebar-icon"></i>
                <span class="sidebar-label">BikeBuild</span>
            </a>
            <button id="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>

        <div class="sidebar-divider"></div>

        <!-- Nav items -->
        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}" class="sidebar-link {{ 'active' if request.endpoint == 'index' }}" title="Dashboard">
                <i class="bi bi-house sidebar-icon"></i>
                <span class="sidebar-label">Dashboard</span>
            </a>
            <a href="{{ url_for('bikes_list') }}" class="sidebar-link {{ 'active' if request.endpoint and request.endpoint.startswith('bike') }}" title="Bikes">
                <i class="bi bi-bicycle sidebar-icon"></i>
                <span class="sidebar-label">Bikes</span>
            </a>
            <a href="{{ url_for('components_list') }}" class="sidebar-link {{ 'active' if request.endpoint and request.endpoint.startswith('component') }}" title="Components">
                <i class="bi bi-gear-wide-connected sidebar-icon"></i>
                <span class="sidebar-label">Components</span>
            </a>
            <a href="{{ url_for('inventory_list') }}" class="sidebar-link {{ 'active' if request.endpoint and request.endpoint.startswith('inventory') }}" title="Inventory">
                <i class="bi bi-box-seam sidebar-icon"></i>
                <span class="sidebar-label">Inventory</span>
            </a>

            <div class="sidebar-divider"></div>

            <a href="{{ url_for('data_manage') }}" class="sidebar-link {{ 'active' if request.endpoint and request.endpoint.startswith('data') }}" title="Data">
                <i class="bi bi-database sidebar-icon"></i>
                <span class="sidebar-label">Data</span>
            </a>
        </nav>
    </aside>

    <div id="mainWrapper" class="main-wrapper collapsed">
        <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 py-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-4 shadow-sm">
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>

    </div>

    <script>
    (function() {
        const sidebar = document.getElementById('sidebar');
        const wrapper = document.getElementById('mainWrapper');
        const toggle = document.getElementById('sidebarToggle');
        const stored = localStorage.getItem('sidebarOpen');
        const isOpen = stored === 'true';

        function expand() {
            sidebar.classList.remove('collapsed');
            wrapper.classList.remove('collapsed');
            toggle.classList.add('rotated');
            localStorage.setItem('sidebarOpen', 'true');
        }

        function collapse() {
            sidebar.classList.add('collapsed');
            wrapper.classList.add('collapsed');
            toggle.classList.remove('rotated');
            localStorage.setItem('sidebarOpen', 'false');
        }

        if (isOpen) expand(); else collapse();

        toggle.addEventListener('click', function() {
            if (sidebar.classList.contains('collapsed')) expand(); else collapse();
        });
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
