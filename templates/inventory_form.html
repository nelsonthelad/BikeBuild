{% extends "base.html" %}
{% block title %}{{ 'Edit' if item else 'Add to' }} Inventory - BikeBuild{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('inventory_list') }}">Inventory</a></li>
        <li class="breadcrumb-item active">{{ 'Edit Item' if item else 'Add Item' }}</li>
    </ol>
</nav>

<h1>{{ 'Edit Inventory Item' if item else 'Add Part to Inventory' }}</h1>

<form method="POST" class="mt-4" style="max-width: 600px;">
    <div class="mb-3">
        <label class="form-label">Component</label>
        <select name="component_id" class="form-select" required>
            <option value="">Select a component...</option>
            {% for c in components %}
            <option value="{{ c.id }}" {{ 'selected' if item and item.component_id == c.id }}>{{ c.manufacturer }} {{ c.model }} ({{ c.component_type }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Condition</label>
        <input type="text" name="condition" class="form-control" value="{{ item.condition if item and item.condition else '' }}" placeholder="e.g. New, Like New, Used">
    </div>
    <div class="mb-3">
        <label class="form-label">Intended Bike (optional)</label>
        <select name="intended_bike_id" class="form-select">
            <option value="">None</option>
            {% for b in bikes %}
            <option value="{{ b.id }}" {{ 'selected' if item and item.intended_bike_id == b.id }}>{{ b.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Any relevant notes">{{ item.notes if item and item.notes else '' }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if item else 'Add to Inventory' }}</button>
    <a href="{{ url_for('inventory_list') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
